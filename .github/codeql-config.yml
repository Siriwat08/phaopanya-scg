# CodeQL configuration — กำหนด paths ที่ CodeQL ควร/ไม่ควรสแกน
# https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages#configuring-code-scanning-for-compiled-languages

# ข้ามไฟล์ HTML เพราะ Apps Script ใช้ template scriptlets (<?= ?>, <?!= ?>)
# ที่ CodeQL มองเป็น syntax error (ไม่ใช่ JavaScript มาตรฐาน)
paths-ignore:
  - '**/*.html'
  - '**/*.css'
  - 'node_modules'
  - 'docs'
  - 'scripts'
  - '.github'
