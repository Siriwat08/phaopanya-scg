# SonarCloud Configuration
# https://docs.sonarsource.com/sonarqube-server/latest/project-administration/analysis-parameters/

sonar.projectKey=Siriwat08_phaopanya-scg
sonar.organization=siriwat08

# Exclude folders that are not our production code:
# - "Information from AI" = reports from other AI agents (not production code)
# - node_modules = dependencies
# - exports/ = pre-formatted skill exports (not production code)
# - .skills/ = skill definitions (documentation, not code)
# - docs/ = documentation (not code)
sonar.exclusions=**/node_modules/**,**/Information from AI allows you to check it quickly/**,**/exports/**,**/.skills/**,**/docs/**

# Only analyze source code + webapp
sonar.sources=src

# Language: JavaScript (Apps Script .gs files are JavaScript)
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8
