# SonarCloud Configuration
# https://docs.sonarsource.com/sonarqube-server/latest/project-administration/analysis-parameters/

sonar.projectKey=Siriwat08_phaopanya-scg
sonar.organization=siriwat08

# Exclude folders that are not our production code:
# - "Information from AI" = reports from other AI agents (not production code)
# - node_modules = dependencies
# - exports/ = pre-formatted skill exports (not production code)
# - .skills/ = skill definitions (documentation, not code)
# - docs/ = documentation (not code — includes AI review .html reports)
# - scripts/ = dev tooling (bump_version.sh, setup scripts — not production code)
#
# Note: docs/ contains .html files with Thai filenames. The **/docs/** pattern
# should exclude them, but SonarCloud's HTML analyzer sometimes scans files
# regardless of sonar.language=js. The explicit **/*.html in docs exclusion
# ensures they are skipped.
sonar.exclusions=**/node_modules/**,**/Information from AI allows you to check it quickly/**,**/exports/**,**/.skills/**,**/docs/**,**/scripts/**,**/docs/**/*.html,**/docs/**/*.css

# Only analyze source code + webapp
sonar.sources=src

# Language: JavaScript (Apps Script .gs files are JavaScript)
# Note: HTML/CSS in src/3_group3_webapp/ are still analyzed as part of JS analysis
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# Disable HTML/CSS analysis entirely (we only want JS analysis of .gs files)
sonar.html.exclusions=**/*.html
sonar.css.exclusions=**/*.css
